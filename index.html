<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кыдырали Рахатов — Задачи</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh}
.wrap{max-width:620px;margin:0 auto;padding:36px 16px 60px}

header{margin-bottom:32px}
.name{font-size:24px;font-weight:700;letter-spacing:-.3px}
.role{font-size:14px;color:#888;margin-top:4px}
.edit-chip{font-size:11px;background:#dbeafe;color:#1d4ed8;padding:2px 9px;border-radius:20px;margin-left:10px;vertical-align:middle;font-weight:500}

.tabs{display:flex;gap:6px;margin-bottom:28px}
.tab{padding:7px 18px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#666;transition:all .12s}
.tab:hover{border-color:#bbb}
.tab.on{background:#111;color:#fff;border-color:#111}

.section{margin-bottom:32px}
.sec-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sec-icon{font-size:13px}

.cards{display:flex;flex-direction:column;gap:7px}
.card{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1.5px solid #ebebeb;border-radius:12px;padding:12px 14px;transition:border-color .12s}
.card.done{opacity:.45}
.card.overdue{border-color:#fca5a5;background:#fff8f8}
.card.urgent-card{border-left:3px solid #ef4444}

.chk{width:18px;height:18px;border:1.5px solid #d1d5db;border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s}
.chk.pers{cursor:pointer}
.chk.pers:hover{border-color:#22c55e}
.chk.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.chk.crm-done{background:#a5b4fc;border-color:#a5b4fc;color:#fff}
.chk.crm-open{background:#f3f4f6;border-color:#d1d5db}

.body{flex:1;min-width:0}
.title{font-size:14px;font-weight:500;line-height:1.4;color:#111}
.card.done .title{text-decoration:line-through}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.tag{font-size:11px;color:#aaa}
.tag.deal{color:#6366f1;font-weight:500}
.tag.due{color:#999}
.tag.late{color:#ef4444;font-weight:600}
.tag.soon{color:#f59e0b;font-weight:600}
.tag.urgent{color:#ef4444;font-weight:600}

.del{font-size:20px;line-height:1;color:#e0e0e0;cursor:pointer;flex-shrink:0;padding:0 3px;display:none;transition:color .12s;margin-top:-1px}
.del:hover{color:#ef4444}
.edit-mode .del{display:block}

.add-box{display:none;margin-top:10px;background:#fff;border:1.5px dashed #d1d5db;border-radius:12px;padding:13px}
.edit-mode .add-box{display:block}
.add-input{width:100%;border:none;outline:none;font-size:14px;color:#111;font-family:inherit;margin-bottom:9px}
.add-input::placeholder{color:#bbb}
.add-row{display:flex;align-items:center;gap:8px}
.add-date{font-size:12px;color:#888;border:1px solid #e5e7eb;border-radius:7px;padding:5px 9px;outline:none;font-family:inherit}
.add-btn{margin-left:auto;padding:6px 18px;background:#111;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s}
.add-btn:hover{background:#333}

.empty{padding:20px 0;text-align:center;color:#ccc;font-size:13px}
.spinner{text-align:center;padding:48px;color:#ccc;font-size:14px}
.footer{margin-top:32px;font-size:11px;color:#ccc;text-align:right}
.footer a{color:#ccc}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="spinner">Загрузка…</div></div>
<script>
const SUPABASE_URL = "https://rmqakjkipczjanlvqnuo.supabase.co"
const SUPABASE_KEY = "sb_publishable_xPspBpluWDicqtXfbLNCkA_ANWBtOJ0"
const CRM_API      = "https://crm.edcrunch.kz/api/public/tasks"
const EDIT_TOKEN   = "rkh2026cto"

const isEdit = new URLSearchParams(location.search).get("t") === EDIT_TOKEN
let tab  = "today"
let crm  = []
let pers = []

// ── Supabase ─────────────────────────────────────────────
const sbH = extra => ({
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json",
  Prefer: "return=representation",
  ...extra
})
const sb = (path, opts = {}) =>
  fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: sbH(), ...opts })
    .then(r => r.ok ? r.json().catch(() => []) : [])
    .catch(() => [])

const loadPers   = ()             => sb("personal_tasks?select=*&order=created_at.asc")
const createTask = (title, due)   => sb("personal_tasks", { method:"POST", body: JSON.stringify({ title, due_date: due||null }) })
const patchTask  = (id, data)     => sb(`personal_tasks?id=eq.${id}`, { method:"PATCH", body: JSON.stringify(data) })
const removeTask = id             => sb(`personal_tasks?id=eq.${id}`, { method:"DELETE" })

// ── Dates ─────────────────────────────────────────────────
const iso    = d  => d.toISOString().split("T")[0]
const today  = () => iso(new Date())
const addDay = n  => { const d=new Date(); d.setDate(d.getDate()+n); return iso(d) }

function dueInfo(due) {
  if (!due)              return { label:"", cls:"" }
  if (due < today())     return { label:"просрочено", cls:"late" }
  if (due === today())   return { label:"сегодня",    cls:"soon" }
  if (due === addDay(1)) return { label:"завтра",     cls:"" }
  const n = Math.round((new Date(due)-new Date(today()))/86400000)
  return { label:`через ${n} дн.`, cls:"" }
}

// ── Filter ────────────────────────────────────────────────
function visible(due, done) {
  if (tab === "all")   return true
  if (done)            return false
  if (tab === "today") return due ? due <= today()    : false
  if (tab === "week")  return due ? due <= addDay(7)  : true
}

// ── Render ────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app")
  if (isEdit) app.classList.add("edit-mode")

  const crmVis  = crm.filter(t  => visible(t.dueDate,  t.status==="DONE"))
  const persVis = pers.filter(t => visible(t.due_date, t.done))
  const now = new Date().toLocaleString("ru-RU",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"})

  app.innerHTML = `
    <header>
      <div class="name">Кыдырали Рахатов${isEdit?' <span class="edit-chip">редактирование</span>':""}</div>
    </header>

    <div class="tabs">
      ${[["today","Сегодня"],["week","Неделя"],["all","Все"]].map(([k,l])=>
        `<button class="tab${tab===k?" on":""}" onclick="setTab('${k}')">${l}</button>`
      ).join("")}
    </div>

    <div class="section">
      <div class="sec-label"><span class="sec-icon">🏢</span>EdCrunch CRM</div>
      <div class="cards">${crmVis.length ? crmVis.map(crmCard).join("") : '<div class="empty">Нет задач</div>'}</div>
    </div>

    <div class="section">
      <div class="sec-label"><span class="sec-icon">📋</span>Другие</div>
      <div class="cards">${persVis.length ? persVis.map(persCard).join("") : '<div class="empty">Нет задач</div>'}</div>
      <div class="add-box">
        <input class="add-input" id="ni" type="text" placeholder="Новая задача…" onkeydown="if(event.key==='Enter')doAdd()">
        <div class="add-row">
          <input class="add-date" id="nd" type="date">
          <button class="add-btn" onclick="doAdd()">+ Добавить</button>
        </div>
      </div>
    </div>

    <div class="footer">Обновлено ${now} · <a href="?">выйти из редактирования</a></div>
  `
}

function crmCard(t) {
  const done = t.status==="DONE"
  const {label,cls} = dueInfo(t.dueDate)
  return `<div class="card ${done?"done":""} ${cls==="late"?"overdue":""} ${t.priority==="URGENT"&&!done?"urgent-card":""}">
    <div class="chk ${done?"crm-done":"crm-open"}">${done?"✓":""}</div>
    <div class="body">
      <div class="title">${esc(t.title)}</div>
      <div class="meta">
        ${t.dealName?`<span class="tag deal">${esc(t.dealName)}</span>`:""}
        ${label?`<span class="tag due ${cls}">${label}</span>`:""}
        ${t.priority==="URGENT"&&!done?'<span class="tag urgent">⚡ Срочно</span>':""}
      </div>
    </div>
  </div>`
}

function persCard(t) {
  const {label,cls} = dueInfo(t.due_date)
  return `<div class="card ${t.done?"done":""} ${cls==="late"?"overdue":""}">
    <div class="chk pers ${t.done?"checked":""}" onclick="doToggle('${t.id}',${t.done})">${t.done?"✓":""}</div>
    <div class="body">
      <div class="title">${esc(t.title)}</div>
      ${label?`<div class="meta"><span class="tag due ${cls}">${label}</span></div>`:""}
    </div>
    <div class="del" onclick="doDelete('${t.id}')">×</div>
  </div>`
}

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ── Actions ───────────────────────────────────────────────
function setTab(t){tab=t;render()}

async function doToggle(id,was){
  const t=pers.find(x=>x.id===id);if(!t)return
  t.done=!was;render()
  await patchTask(id,{done:!was})
}

async function doDelete(id){
  pers=pers.filter(t=>t.id!==id);render()
  await removeTask(id)
}

async function doAdd(){
  const ni=document.getElementById("ni")
  const nd=document.getElementById("nd")
  const title=ni?.value.trim();if(!title)return
  const due=nd?.value||null
  pers.push({id:crypto.randomUUID(),title,due_date:due,done:false,created_at:new Date().toISOString()})
  render()
  await createTask(title,due)
  pers=await loadPers()
  render()
}

// ── Boot ──────────────────────────────────────────────────
;(async()=>{
  const [c,p]=await Promise.all([
    fetch(CRM_API).then(r=>r.json()).catch(()=>[]),
    loadPers()
  ])
  crm=Array.isArray(c)?c:[]
  pers=Array.isArray(p)?p:[]
  render()
})()
</script>
</body>
</html>
